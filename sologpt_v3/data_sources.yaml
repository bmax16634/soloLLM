version: 1
description: "SoloLLM v3 1B-token pilot source mix"
tokenizer: gpt2
seq_length: 1024
target_tokens: 1000000000
shard_tokens: 8388608
split:
  train: 0.98
  val: 0.01
  test: 0.01
filters:
  min_chars: 200
  max_chars: 200000
  min_alpha_ratio: 0.45
  max_repeated_line_fraction: 0.35
  min_language_score: 0.65
streaming:
  shuffle_buffer: 0
  seed: 1337
sources:
  - id: fineweb_edu_sample_10bt
    enabled: true
    weight: 0.40
    dataset: HuggingFaceFW/fineweb-edu
    config: sample-10BT
    split: train
    text_field: text
    notes: "High-quality educational web text; primary external-generalization bet."
  - id: dclm_baseline
    enabled: true
    weight: 0.25
    dataset: mlfoundations/dclm-baseline-1.0-parquet
    config: null
    split: train
    text_field: text
    notes: "Curated web baseline; useful diversity and quality signal."
  - id: fineweb_sample_10bt
    enabled: true
    weight: 0.15
    dataset: HuggingFaceFW/fineweb
    config: sample-10BT
    split: train
    text_field: text
    notes: "Broader web distribution."
  - id: wikipedia_en_20231101
    enabled: true
    weight: 0.10
    dataset: wikimedia/wikipedia
    config: 20231101.en
    split: train
    text_field: text
    notes: "Long-form encyclopedic prose. Keep modest and add contamination checks before final v3."
  - id: openwebtext
    enabled: true
    weight: 0.10
    dataset: Skylion007/openwebtext
    config: plain_text
    split: train
    text_field: text
    notes: "Preserves the v2/project distribution."
  - id: stack_v2_code_optional
    enabled: false
    weight: 0.00
    dataset: bigcode/the-stack-v2
    config: null
    split: train
    text_field: content
    notes: "Optional small code/docs slice after gated access and license policy are confirmed."
